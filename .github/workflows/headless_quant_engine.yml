name: IDX Quant Terminal — Autonomous Institutional Run

on:
  schedule:
    # Berjalan otomatis setiap Senin–Jumat pukul 17:00 WIB (10:00 UTC)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    # Memunculkan tombol "Run workflow" di web GitHub agar bisa dijalankan manual kapan saja

jobs:
  execute-quant-engines:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Arsitektur Enterprise
        uses: actions/checkout@v4

      - name: 2. Siapkan Python 3.10 di Server GitHub
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. Install Dependensi & Package Modular
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: 4. Eksekusi 14 Mesin & 7 Layer Intelijen Keputusan
        run: |
          python -c "
          import os, json
          from application.workflows.pipeline import QuantTerminalWorkflow
          from data.ingestion.collector import LiveDataCollector
          from infrastructure.messaging.event_bus import bus, Event

          print('>>> MENGAKUISISI DATA PASAR BEI...')
          tickers = ['BBCA', 'BBRI', 'BMRI', 'TLKM', 'ASII', 'ADRO']
          live_data = LiveDataCollector.fetch_market_data(tickers)

          decisions = []
          bus.subscribe('DECISION_GENERATED', lambda e: decisions.extend(e.payload['decisions']))

          config = {'engine_weights': {'ValueInvesting': 0.35, 'CorporateAction': 0.20, 'MarketTransaction': 0.20, 'SwingTrading': 0.25}}
          workflow = QuantTerminalWorkflow(config)

          # Memicu Event Bus
          bus.publish(Event('DATA_UPDATED', {'vix': 18.5, 'idr_usd': 16250.0, 'foreign_flow_bn': 2500.0, 'tickers': live_data}))

          # Tulis output ke GitHub Step Summary (Markdown format)
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', 'report.md')
          with open(summary_path, 'w', encoding='utf-8') as f:
              f.write('# ⚡ IDX Quant Terminal — Institutional White-Box Report\\n\\n')
              f.write('**Arsitektur:** Clean Architecture | Domain-Driven Design | Zero Trimming\\n\\n')
              f.write('| Ticker | Rating | Skor Quant | Fair Value (Est) | Target Price | Confidence |\\n')
              f.write('|---|---|---|---|---|---|\\n')
              for d in decisions:
                  f.write(f'| **{d.ticker}** | {d.rating} | {d.final_score}/100 | Rp {d.fair_value:,.0f} | Rp {d.target_price:,.0f} | {d.confidence_level}% |\\n')
              
              f.write('\\n## 🔍 White-Box Explainable AI (Audit Trail)\\n')
              for d in decisions:
                  f.write(f'\\n### 📌 {d.ticker} — Rating: {d.rating}\\n')
                  f.write(f'- **Entry Zone:** {d.entry_zone} | **Exit Zone:** {d.exit_zone}\\n')
                  f.write('- **Kontribusi Skor Mesin:** ' + str(d.engine_breakdown) + '\\n')
                  f.write('- **Log Logika Kalkulasi:**\\n')
                  for line in d.white_box_explanation:
                      f.write(f'  - {line}\\n')
                  if d.conflict_resolution_log:
                      f.write('- **⚠️ Resolusi Konflik Sinyal:**\\n')
                      for log in d.conflict_resolution_log:
                          f.write(f'  - {log}\\n')
          print('>>> EKSEKUSI SELESAI. LAPORAN DITERBITKAN KE GITHUB SUMMARY.')
          "
